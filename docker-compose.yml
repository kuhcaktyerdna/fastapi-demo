version: '3'
services:
  postgres:
    image: postgres:10.5
    restart: always
    container_name: posts_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
    - "5432:5432"
networks:
  pytest:
    ipam:
      driver: default
